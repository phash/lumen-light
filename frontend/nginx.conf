server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip-Kompression fuer textbasierte Assets
    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml;
    gzip_min_length 1024;

    # Bekannte Scan-/Junk-Pfade hart auf 404 statt SPA-Fallback (200 +
    # index.html) — vermeidet Soft-404s und gibt Scannern keinen 200.
    location ~* (\.php$|\.env$|/\.git|/wp-) {
        return 404;
    }

    # SPA-Fallback: alle nicht existierenden Pfade -> index.html.
    # $uri.html liefert prerenderte Flat-Files (z. B. /datenschutz ->
    # datenschutz.html) OHNE 301-Trailing-Slash-Redirect; Canonical bleibt
    # so deckungsgleich mit der ausgelieferten URL.
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    # Statische Assets aggressiv cachen — sind hash-getaggt
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # config.js NICHT cachen — soll zur Run-Time aktualisierbar sein
    location = /config.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires off;
    }

    # index.html nicht cachen — laedt config.js + neueste Asset-Hashes
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires off;
    }
}
