server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip-Kompression fuer textbasierte Assets
    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml;
    gzip_min_length 1024;

    # SPA-Fallback: alle nicht existierenden Pfade -> index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Statische Assets aggressiv cachen — sind hash-getaggt
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # config.js NICHT cachen — soll zur Run-Time aktualisierbar sein
    location = /config.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires off;
    }

    # index.html nicht cachen — laedt config.js + neueste Asset-Hashes
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires off;
    }
}
