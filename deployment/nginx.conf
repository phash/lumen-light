# Rate Limit Zones
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=120r/m;

# HTTP -> HTTPS Redirect (in Production)
# server {
#     listen 80;
#     server_name lumen.example.com;
#     return 301 https://$host$request_uri;
# }

server {
    listen 80;
    # listen 443 ssl http2;
    server_name _;

    # ssl_certificate     /etc/nginx/certs/fullchain.pem;
    # ssl_certificate_key /etc/nginx/certs/privkey.pem;
    # ssl_protocols       TLSv1.2 TLSv1.3;

    # Security-Header
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Frontend (statisches React-Build)
    root /var/www/lumen;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Aggressives Caching für hash-getaggte Assets
    location /assets/ {
        expects 1y;
        add_header Cache-Control "public, immutable";
    }

    # API-Proxy zum Backend
    location /api/v1/auth/ {
        limit_req zone=auth_limit burst=10 nodelay;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/ {
        limit_req zone=api_limit burst=30 nodelay;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # OpenAPI-Docs nur in Dev/Staging — in Prod entfernen oder per Auth schützen
    location ~ ^/api/v1/(docs|redoc|openapi.json) {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    client_max_body_size 50M;  # für eventuell größere RAW-Uploads (Stretch)
}
