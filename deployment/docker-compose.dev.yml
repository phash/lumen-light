# Lokaler Dev-Stack: Postgres + Keycloak + MinIO (S3 stand-in fuer Garage).
# Lumen-Backend + Frontend laufen NICHT hier (Issuer-Matching macht das
# friemelig — kommt in Iteration 7 als Production-Deploy).
#
# Aufruf:
#   docker compose -f deployment/docker-compose.dev.yml up -d
# dann:
#   cd backend && uvicorn app.main:app --reload --port 8000
#   cd frontend && npm run dev
#
# Default-Admins (NICHT in Production verwenden):
#   Keycloak: admin / admin
#   MinIO:    minioadmin / minioadmin

services:
  postgres:
    image: postgres:16-alpine
    container_name: lumen-dev-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: lumen
      POSTGRES_PASSWORD: lumen
      POSTGRES_DB: lumen
    ports:
      - "5433:5432"
    volumes:
      - lumen_dev_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lumen"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: lumen-dev-keycloak
    restart: unless-stopped
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
    ports:
      - "18080:8080"
      - "19000:9000"
    volumes:
      - ../infra/keycloak/lumen-realm.json:/opt/keycloak/data/import/realm.json:ro

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: lumen-dev-minio
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - lumen_dev_minio:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:RELEASE.2024-11-17T19-35-25Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb --ignore-existing local/lumen-images;
        mc anonymous set none local/lumen-images;
        echo 'Bucket lumen-images bereit.';
      "

volumes:
  lumen_dev_pg:
  lumen_dev_minio:
