name: CI

# Pflicht-Checks pro PR + push auf main:
#   - Frontend: lint, typecheck, vitest (mit Coverage), build
#   - Backend:  pytest (mit testcontainers fuer Postgres + MinIO + Keycloak,
#               inkl. Coverage-Report).
# E2E (Playwright) laeuft NICHT hier (Stack-Boot dauert) — siehe die eigene
# Workflow-Datei .github/workflows/e2e.yml (nightly cron + workflow_dispatch).
#
# Sicherheitshinweis: keine Verwendung von nutzergesteuerten Inputs
# (issue-titles, PR-bodies etc.) in run-Commands — alle Werte sind
# entweder konstant oder Secrets via env.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm exec tsc -b --noEmit

      - name: Tests (mit Coverage)
        run: pnpm run test:coverage

      - name: Build
        run: pnpm build
        env:
          VITE_KEYCLOAK_AUTHORITY: http://placeholder
          VITE_KEYCLOAK_CLIENT_ID: placeholder
          VITE_API_BASE: http://placeholder/api/v1

  backend:
    name: Backend
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt -r requirements-dev.txt

      - name: pytest (mit Coverage)
        run: .venv/bin/pytest -q --cov=app --cov-report=term-missing
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"
