name: CI

# Pflicht-Checks pro PR + push auf main:
#   - Frontend: lint, typecheck, vitest, build
#   - Backend:  pytest (mit testcontainers fuer Postgres + MinIO + Keycloak).
# E2E (Playwright) laeuft als nightly cron, nicht in jedem PR-Run.
#
# Sicherheitshinweis: keine Verwendung von nutzergesteuerten Inputs
# (issue-titles, PR-bodies etc.) in run-Commands — alle Werte sind
# entweder konstant oder Secrets via env.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm exec tsc -b --noEmit

      - name: Tests
        run: pnpm test

      - name: Build
        run: pnpm build
        env:
          VITE_KEYCLOAK_AUTHORITY: http://placeholder
          VITE_KEYCLOAK_CLIENT_ID: placeholder
          VITE_API_BASE: http://placeholder/api/v1

  backend:
    name: Backend
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt -r requirements-dev.txt

      - name: pytest
        run: .venv/bin/pytest -q
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"
